services:
  - type: web
    name: task-tracker-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false  # Set this manually in Render dashboard
      - key: CLIENT_URL
        sync: false  # Your Vercel frontend URL
